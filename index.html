<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빌드앤그로우 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #f4f6fa; color: #222; }
  header { background: #E3001B; color: #fff; padding: 18px 28px; display: flex; align-items: center; gap: 14px; }
  header h1 { font-size: 1.2rem; font-weight: 700; }
  header span { font-size: 0.85rem; opacity: 0.85; margin-left: auto; }
  .tabs { display: flex; gap: 0; background: #fff; border-bottom: 2px solid #eee; padding: 0 24px; }
  .tab { padding: 13px 22px; cursor: pointer; font-size: 0.9rem; color: #888; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s; }
  .tab.active { color: #E3001B; border-bottom-color: #E3001B; font-weight: 700; }
  .tab:hover { color: #E3001B; }
  .section { display: none; padding: 24px; }
  .section.active { display: block; }
  .kpi-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  .kpi { background: #fff; border-radius: 10px; padding: 18px 22px; flex: 1; min-width: 150px; box-shadow: 0 1px 6px rgba(0,0,0,.07); }
  .kpi .label { font-size: 0.78rem; color: #888; margin-bottom: 6px; }
  .kpi .val { font-size: 1.6rem; font-weight: 700; color: #E3001B; }
  .kpi .sub { font-size: 0.78rem; color: #aaa; margin-top: 4px; }
  .card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.07); margin-bottom: 20px; }
  .card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 16px; color: #333; }
  .chart-wrap { position: relative; height: 280px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { background: #f8f8f8; padding: 9px 12px; text-align: left; color: #555; font-weight: 600; border-bottom: 1px solid #eee; }
  td { padding: 8px 12px; border-bottom: 1px solid #f2f2f2; }
  tr:hover td { background: #fafafa; }
  .rank { color: #E3001B; font-weight: 700; width: 30px; }
  #loading { text-align: center; padding: 80px; color: #888; font-size: 1rem; }
  #error { text-align: center; padding: 60px; color: #E3001B; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; }
  .badge-mo { background: #fff0f0; color: #E3001B; }
  .badge-pc { background: #f0f4ff; color: #3366cc; }
  .repeat-table td:first-child { font-weight: 700; color: #E3001B; }
  @media(max-width:700px) { .grid2 { grid-template-columns: 1fr; } .kpi .val { font-size: 1.3rem; } }
</style>
</head>
<body>

<header>
  <div>
    <h1>🏪 빌드앤그로우 회원·매출 대시보드</h1>
  </div>
  <span id="period"></span>
</header>

<div id="loading">⏳ 데이터 불러오는 중...</div>
<div id="error" style="display:none"></div>

<div id="app" style="display:none">
  <div class="tabs">
    <div class="tab active" onclick="showTab(0)">📅 월별 가입자</div>
    <div class="tab" onclick="showTab(1)">🛒 가입 vs 구매</div>
    <div class="tab" onclick="showTab(2)">📊 가입경로</div>
    <div class="tab" onclick="showTab(3)">💰 월별 매출</div>
    <div class="tab" onclick="showTab(4)">🏆 TOP 30 상품</div>
    <div class="tab" onclick="showTab(5)">🔄 재구매 회원</div>
  </div>

  <!-- 탭0: 월별 가입자 -->
  <div class="section active" id="tab0">
    <div class="kpi-row" id="kpi0"></div>
    <div class="card"><h3>월별 가입자 수</h3><div class="chart-wrap"><canvas id="chart0"></canvas></div></div>
  </div>

  <!-- 탭1: 가입 vs 구매 -->
  <div class="section" id="tab1">
    <div class="card"><h3>월별 가입자 수 vs 구매자 수</h3><div class="chart-wrap"><canvas id="chart1"></canvas></div></div>
    <div class="card"><h3>월별 구매 전환율</h3><div class="chart-wrap"><canvas id="chart1b"></canvas></div></div>
  </div>

  <!-- 탭2: 가입경로 -->
  <div class="section" id="tab2">
    <div class="grid2">
      <div class="card"><h3>전체 가입경로 비중</h3><div class="chart-wrap"><canvas id="chart2a"></canvas></div></div>
      <div class="card"><h3>월별 가입경로 추이</h3><div class="chart-wrap"><canvas id="chart2b"></canvas></div></div>
    </div>
  </div>

  <!-- 탭3: 월별 매출 -->
  <div class="section" id="tab3">
    <div class="kpi-row" id="kpi3"></div>
    <div class="card"><h3>월별 승인금액 (실매출)</h3><div class="chart-wrap"><canvas id="chart3"></canvas></div></div>
  </div>

  <!-- 탭4: TOP 30 상품 -->
  <div class="section" id="tab4">
    <div class="card">
      <h3>가장 많이 팔린 상품 TOP 30 <small style="color:#aaa;font-weight:400">(판매 건수 기준)</small></h3>
      <table id="top30table">
        <thead><tr><th>순위</th><th>상품명</th><th>판매수</th><th>총 승인금액</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- 탭5: 재구매 -->
  <div class="section" id="tab5">
    <div class="kpi-row" id="kpi5"></div>
    <div class="grid2">
      <div class="card">
        <h3>구매 횟수별 회원 분포</h3>
        <div class="chart-wrap"><canvas id="chart5"></canvas></div>
      </div>
      <div class="card">
        <h3>다회 구매 회원 목록 (2회 이상)</h3>
        <div style="max-height:320px;overflow-y:auto">
          <table class="repeat-table" id="repeatTable">
            <thead><tr><th>구매횟수</th><th>회원ID</th><th>이름</th><th>총 승인금액</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const JOIN_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXcmE_qakJLjMaqcQHHy-Si7uKHPqGfLnrvLSPNzqTWRYXf60bPqX6zjkSiGnVuWijN9moknW0pEfS/pub?gid=0&single=true&output=csv";
const PUR_URL  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXcmE_qakJLjMaqcQHHy-Si7uKHPqGfLnrvLSPNzqTWRYXf60bPqX6zjkSiGnVuWijN9moknW0pEfS/pub?gid=1469334619&single=true&output=csv";

const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
const COLORS = ["#E3001B","#ff6b6b","#ffa94d","#ffd43b","#69db7c","#4dabf7","#748ffc","#da77f2","#f783ac","#a9e34b","#63e6be","#74c0fc"];

function parseCSV(txt) {
  const lines = txt.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().replace(/"/g,""));
  return lines.slice(1).map(line => {
    // CSV 파싱 (쌍따옴표 안의 콤마 처리)
    const cols = [];
    let cur = "", inQ = false;
    for (let c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else cur += c;
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = (cols[i]||"").replace(/"/g,""));
    return obj;
  });
}

function getMonth(dateStr) {
  // "2026-06-15" or "2026. 6. 15" 등
  const m = dateStr.match(/\d{4}[\.\-]\s*(\d{1,2})/);
  return m ? parseInt(m[1]) : null;
}

function fmt(n) { return n.toLocaleString()+"원"; }

let charts = {};
function destroyChart(id) { if(charts[id]) { charts[id].destroy(); delete charts[id]; } }

function showTab(i) {
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', i===j));
  document.querySelectorAll('.section').forEach((s,j) => s.classList.toggle('active', i===j));
}

async function fetchCSV(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error("데이터 로드 실패");
  return parseCSV(await res.text());
}

async function init() {
  try {
    const [joinRows, purRows] = await Promise.all([fetchCSV(JOIN_URL), fetchCSV(PUR_URL)]);

    // --- 가입 데이터 ---
    const joinByMonth = {};
    const routeByMonth = {};
    joinRows.forEach(r => {
      const mo = getMonth(r["가입일"]);
      if (!mo) return;
      joinByMonth[mo] = (joinByMonth[mo]||0) + 1;
      if (!routeByMonth[mo]) routeByMonth[mo] = {};
      const route = r["가입경로"]||"기타";
      routeByMonth[mo][route] = (routeByMonth[mo][route]||0) + 1;
    });

    // --- 결제 데이터 ---
    const purByMonth = {};
    const purMemByMonth = {};
    const salesByMonth = {};
    const productCount = {};
    const memberPur = {}; // 회원ID → {count, amount, name}

    purRows.forEach(r => {
      const mo = getMonth(r["결제일"]);
      if (!mo) return;
      const mid = r["회원ID"]||"";
      const amt = parseInt((r["승인금액"]||"0").replace(/,/g,""))||0;
      const name = r["이름"]||"";

      purByMonth[mo] = (purByMonth[mo]||0) + 1;
      salesByMonth[mo] = (salesByMonth[mo]||0) + amt;

      if (mid) {
        if (!purMemByMonth[mo]) purMemByMonth[mo] = new Set();
        purMemByMonth[mo].add(mid);
        if (!memberPur[mid]) memberPur[mid] = {count:0, amount:0, name};
        memberPur[mid].count++;
        memberPur[mid].amount += amt;
      }

      // 상품 파싱 (콤마로 구분된 상품들)
      const prods = r["상품명"]||"";
      prods.split(",").map(p=>p.trim()).filter(Boolean).forEach(p => {
        productCount[p] = (productCount[p]||0) + 1;
      });
    });

    const allMonths = [...new Set([...Object.keys(joinByMonth), ...Object.keys(salesByMonth)])].map(Number).sort((a,b)=>a-b);
    const labels = allMonths.map(m => m+"월");

    // 기간 표시
    document.getElementById("period").textContent = `${Math.min(...allMonths)}월 ~ ${Math.max(...allMonths)}월`;

    // === 탭0: 월별 가입자 ===
    const totalJoin = Object.values(joinByMonth).reduce((a,b)=>a+b,0);
    document.getElementById("kpi0").innerHTML = `
      <div class="kpi"><div class="label">전체 가입자</div><div class="val">${totalJoin.toLocaleString()}명</div></div>
      <div class="kpi"><div class="label">월 평균 가입</div><div class="val">${Math.round(totalJoin/allMonths.length).toLocaleString()}명</div></div>
      <div class="kpi"><div class="label">최다 가입월</div><div class="val">${Object.entries(joinByMonth).sort((a,b)=>b[1]-a[1])[0]?.[0]}월</div><div class="sub">${Math.max(...Object.values(joinByMonth)).toLocaleString()}명</div></div>
    `;
    destroyChart("c0");
    charts["c0"] = new Chart(document.getElementById("chart0"), {
      type:"bar",
      data:{ labels, datasets:[{ label:"가입자 수", data: allMonths.map(m=>joinByMonth[m]||0), backgroundColor:"#E3001B", borderRadius:6 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}} }
    });

    // === 탭1: 가입 vs 구매 ===
    const joinArr = allMonths.map(m=>joinByMonth[m]||0);
    const purMemArr = allMonths.map(m=>purMemByMonth[m]?.size||0);
    const rateArr = allMonths.map((m,i)=> joinArr[i]>0 ? Math.round(purMemArr[i]/joinArr[i]*100) : 0);

    destroyChart("c1");
    charts["c1"] = new Chart(document.getElementById("chart1"), {
      type:"bar",
      data:{ labels, datasets:[
        { label:"가입자", data:joinArr, backgroundColor:"#4dabf7", borderRadius:4 },
        { label:"구매자", data:purMemArr, backgroundColor:"#E3001B", borderRadius:4 }
      ]},
      options:{ responsive:true, maintainAspectRatio:false, scales:{y:{beginAtZero:true}} }
    });
    destroyChart("c1b");
    charts["c1b"] = new Chart(document.getElementById("chart1b"), {
      type:"line",
      data:{ labels, datasets:[{ label:"구매전환율(%)", data:rateArr, borderColor:"#E3001B", backgroundColor:"rgba(227,0,27,0.1)", fill:true, tension:0.4, pointRadius:5 }]},
      options:{ responsive:true, maintainAspectRatio:false, scales:{y:{beginAtZero:true, max:100}} }
    });

    // === 탭2: 가입경로 ===
    const allRoutes = [...new Set(joinRows.map(r=>r["가입경로"]||"기타"))];
    const routeTotals = {};
    allRoutes.forEach(rt => { routeTotals[rt] = joinRows.filter(r=>(r["가입경로"]||"기타")===rt).length; });

    destroyChart("c2a");
    charts["c2a"] = new Chart(document.getElementById("chart2a"), {
      type:"doughnut",
      data:{ labels: Object.keys(routeTotals), datasets:[{ data: Object.values(routeTotals), backgroundColor: COLORS }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:"bottom"}} }
    });

    destroyChart("c2b");
    charts["c2b"] = new Chart(document.getElementById("chart2b"), {
      type:"bar",
      data:{ labels, datasets: allRoutes.map((rt,i)=>({
        label:rt, data: allMonths.map(m=>(routeByMonth[m]||{})[rt]||0),
        backgroundColor: COLORS[i%COLORS.length], borderRadius:4
      }))},
      options:{ responsive:true, maintainAspectRatio:false, scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}} }
    });

    // === 탭3: 월별 매출 ===
    const totalSales = Object.values(salesByMonth).reduce((a,b)=>a+b,0);
    const totalPur = Object.values(purByMonth).reduce((a,b)=>a+b,0);
    document.getElementById("kpi3").innerHTML = `
      <div class="kpi"><div class="label">전체 승인금액</div><div class="val">${(totalSales/10000).toLocaleString()}만원</div></div>
      <div class="kpi"><div class="label">전체 결제 건수</div><div class="val">${totalPur.toLocaleString()}건</div></div>
      <div class="kpi"><div class="label">건당 평균</div><div class="val">${Math.round(totalSales/totalPur).toLocaleString()}원</div></div>
      <div class="kpi"><div class="label">최다 매출월</div><div class="val">${Object.entries(salesByMonth).sort((a,b)=>b[1]-a[1])[0]?.[0]}월</div></div>
    `;
    destroyChart("c3");
    charts["c3"] = new Chart(document.getElementById("chart3"), {
      type:"bar",
      data:{ labels, datasets:[{ label:"승인금액", data: allMonths.map(m=>salesByMonth[m]||0), backgroundColor:"#E3001B", borderRadius:6 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true, ticks:{callback:v=>v>=10000?(v/10000).toFixed(0)+"만":v}}} }
    });

    // === 탭4: TOP 30 상품 ===
    const top30 = Object.entries(productCount).sort((a,b)=>b[1]-a[1]).slice(0,30);
    // 상품별 승인금액 합산
    const productAmt = {};
    purRows.forEach(r => {
      const amt = parseInt((r["승인금액"]||"0").replace(/,/g,""))||0;
      (r["상품명"]||"").split(",").map(p=>p.trim()).filter(Boolean).forEach(p => {
        productAmt[p] = (productAmt[p]||0) + amt;
      });
    });
    const tbody4 = document.querySelector("#top30table tbody");
    tbody4.innerHTML = top30.map(([prod,cnt],i)=>`
      <tr><td class="rank">${i+1}</td><td>${prod}</td><td>${cnt}건</td><td>${(productAmt[prod]||0).toLocaleString()}원</td></tr>
    `).join("");

    // === 탭5: 재구매 ===
    const repeatMembers = Object.entries(memberPur).filter(([,v])=>v.count>=2).sort((a,b)=>b[1].count-a[1].count);
    const onceMembers = Object.entries(memberPur).filter(([,v])=>v.count===1);
    const countDist = {};
    Object.values(memberPur).forEach(v => { countDist[v.count] = (countDist[v.count]||0)+1; });

    document.getElementById("kpi5").innerHTML = `
      <div class="kpi"><div class="label">전체 구매 회원</div><div class="val">${Object.keys(memberPur).length.toLocaleString()}명</div></div>
      <div class="kpi"><div class="label">재구매 회원 (2회↑)</div><div class="val">${repeatMembers.length.toLocaleString()}명</div></div>
      <div class="kpi"><div class="label">1회 구매 회원</div><div class="val">${onceMembers.length.toLocaleString()}명</div></div>
      <div class="kpi"><div class="label">최다 구매 횟수</div><div class="val">${Math.max(...Object.values(memberPur).map(v=>v.count))}회</div></div>
    `;

    const distLabels = Object.keys(countDist).map(Number).sort((a,b)=>a-b);
    destroyChart("c5");
    charts["c5"] = new Chart(document.getElementById("chart5"), {
      type:"bar",
      data:{ labels: distLabels.map(n=>n+"회"), datasets:[{ label:"회원 수", data: distLabels.map(n=>countDist[n]), backgroundColor:"#E3001B", borderRadius:6 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}} }
    });

    const tbody5 = document.querySelector("#repeatTable tbody");
    tbody5.innerHTML = repeatMembers.map(([mid,v])=>`
      <tr><td>${v.count}회</td><td>${mid}</td><td>${v.name}</td><td>${v.amount.toLocaleString()}원</td></tr>
    `).join("");

    document.getElementById("loading").style.display="none";
    document.getElementById("app").style.display="block";

  } catch(e) {
    document.getElementById("loading").style.display="none";
    document.getElementById("error").style.display="block";
    document.getElementById("error").innerHTML = `⚠️ 오류: ${e.message}<br><small>Google Sheets 웹 게시 설정을 확인해주세요.</small>`;
  }
}

init();
</script>
</body>
</html>
